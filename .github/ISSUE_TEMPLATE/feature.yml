name: Feature request
description: Propose a new capability or behavior.
title: "[Feature]: "
labels:
  - "needs-triage"
  - "type: feature"
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem should this feature solve?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: What should be true when this is complete?
    validations:
      required: true
  - type: dropdown
    id: project
    attributes:
      label: Project
      options:
        - platform
        - nornir-mcp
        - document-ingestion-mcp
        - knowledge-graph-mcp
        - episodic-memory-mcp
        - change-management-mcp
        - governance
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What is in scope, and what is explicitly out of scope?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: List concrete criteria reviewers can verify.
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Test and validation expectations
      description: What tests, fixtures, screenshots, command output, or evidence should be included?
    validations:
      required: true
  - type: textarea
    id: security
    attributes:
      label: Security, identity, and data impact
      description: Note any impact to auth, delegated identity, secrets, MCP tools, network access, memory, or data handling.
    validations:
      required: true
